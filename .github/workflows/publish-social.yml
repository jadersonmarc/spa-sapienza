name: Publish to Social Media

# Dispara quando um novo post MDX entra na main (commit via GitHub API pelo n8n).
# Extrai o frontmatter e aciona o webhook do n8n, que publica no Instagram e LinkedIn.
# Também pode ser disparado manualmente (workflow_dispatch) para testar a conexão
# com o webhook usando um payload de teste.
on:
  push:
    branches: [main]
    paths:
      - 'app/blog/posts/**.mdx'
  workflow_dispatch:

jobs:
  post-social:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new post
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual=true" >> "$GITHUB_OUTPUT"
            echo "file=__manual_test__" >> "$GITHUB_OUTPUT"
            echo "Disparo manual: usando payload de teste."
          else
            NEW_FILE=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'app/blog/posts/*.mdx' | head -n 1)
            echo "file=$NEW_FILE" >> "$GITHUB_OUTPUT"
            if [ -n "$NEW_FILE" ]; then
              echo "Novo post detectado: $NEW_FILE"
            else
              echo "Nenhum post novo neste push."
            fi
          fi

      - name: Setup Node
        if: steps.detect.outputs.file != '' && steps.detect.outputs.manual != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install gray-matter
        if: steps.detect.outputs.file != '' && steps.detect.outputs.manual != 'true'
        run: npm install gray-matter

      - name: Build payload
        if: steps.detect.outputs.file != ''
        run: |
          if [ "${{ steps.detect.outputs.manual }}" = "true" ]; then
            printf '%s' '{"title":"Teste manual da Action","slug":"teste-action","excerpt":"Disparo manual para validar a conexao GitHub Action -> webhook n8n.","pillar":"engenharia","publishedAt":"2026-06-15","url":"https://sapienzalabs.com.br/blog/teste-action","tags":["pme"]}' > meta.json
          else
            node scripts/extract-post-meta.mjs "${{ steps.detect.outputs.file }}" > meta.json
          fi
          echo "Payload:"
          cat meta.json

      - name: Notify n8n webhook
        if: steps.detect.outputs.file != ''
        env:
          # Aceita os dois nomes possíveis de secret para evitar mismatch silencioso.
          WEBHOOK_URL: ${{ secrets.N8N_SOCIAL_WEBHOOK_URL || secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET || secrets.WEBHOOK_SECRET }}
        run: |
          # Diagnóstico: imprime o comprimento (nunca o valor) para confirmar que
          # os secrets resolveram. Comprimento 0 = secret ausente / nome errado.
          echo "WEBHOOK_URL length: ${#WEBHOOK_URL}"
          echo "WEBHOOK_SECRET length: ${#WEBHOOK_SECRET}"
          if [ -z "$WEBHOOK_URL" ] || [ -z "$WEBHOOK_SECRET" ]; then
            echo "::error::Secret vazio. Confira em Settings > Secrets and variables > Actions (aba Secrets, nao Variables) se existem N8N_SOCIAL_WEBHOOK_URL/N8N_WEBHOOK_SECRET (ou WEBHOOK_URL/WEBHOOK_SECRET) como Repository secrets."
            exit 1
          fi
          # Captura status + corpo em vez de falhar em silêncio (curl -sf).
          code=$(curl -s -o body.txt -w '%{http_code}' -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
            -d @meta.json)
          echo "HTTP $code"
          echo "Resposta do webhook:"
          cat body.txt; echo
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Webhook retornou HTTP $code. 401/404=workflow n8n inativo ou URL errada; 500 'No item to return'=X-Webhook-Secret diverge do N8N_WEBHOOK_SECRET."
            exit 1
          fi
          echo "Publicado com sucesso."
